name: Build iOS App

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Resolve Swift Package Manager Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
                     -workspace ios/App/App.xcworkspace \
                     -scheme App

      - name: Build Xcode Project for iOS Simulator
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Debug \
                     -destination "generic/platform=iOS Simulator" \
                     -derivedDataPath build \
                     clean build

      - name: Zip Simulator App Build
        run: |
          cd build/Build/Products/Debug-iphonesimulator
          zip -r ../../../nature-home-clean-ios-simulator.zip App.app

      - name: Upload iOS Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: nature-home-clean-ios-simulator
          path: nature-home-clean-ios-simulator.zip
