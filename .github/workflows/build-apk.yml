name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build

      - name: Sync Capacitor Assets
        run: npx cap sync android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew
        working-directory: .

      - name: Generate Release Keystore
        run: keytool -genkeypair -v -keystore android/app/my-release-key.keystore -alias natureclean -keyalg RSA -keysize 2048 -validity 10000 -storepass natureclean123 -keypass natureclean123 -dname "CN=NatureClean, O=NatureHomeClean, C=IN"

      - name: Build Android APKs
        run: ./gradlew assembleDebug assembleRelease
        working-directory: android

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: nature-home-clean-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload Signed Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nature-home-clean-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
